<!DOCTYPE html>
<html>
<head>
    <title>Playground</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .box {
            width: 100px;
            height: 100px;
            margin: 10px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <h1>Welcome!</h1>

    <div class="container">
        {% for i in range(num) %}
            <div class="box" data-color="{{ color }}"></div>
        {% endfor %}
    </div>

    <script>
        const boxes = document.querySelectorAll(".box");

        boxes.forEach(function(box) {
            box.style.backgroundColor = box.dataset.color;
        });
    </script>
</body>
</html>

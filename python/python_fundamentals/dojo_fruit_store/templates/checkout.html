<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>
    <h1>Thank you for your order!</h1>

    <p>
        We ordered {{ count }} items for you and charged your student account.
    </p>

    <h3>You've ordered</h3>

    <table border="1">
        <tr>
            <th>Fruit Name</th>
            <th>Quantity</th>
        </tr>

        <tr>
            <td>Strawberry</td>
            <td>{{ strawberry }}</td>
        </tr>

        <tr>
            <td>Raspberry</td>
            <td>{{ raspberry }}</td>
        </tr>

        <tr>
            <td>Apple</td>
            <td>{{ apple }}</td>
        </tr>
    </table>

    <h3>Your Information</h3>

    <p>Name: {{ name }}</p>
    <p>Your Student ID: {{ student_id }}</p>
</body>
</html>
